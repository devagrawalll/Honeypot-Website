<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #EEF2FF;
    --bg-2: #F5F3FF;
    --card: #FFFFFF;
    --accent: #4F46E5;
    --accent-dark: #4338CA;
    --text-dark: #1E1B2E;
    --text-muted: #6B7280;
    --border: #E5E7EB;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
    color: var(--text-dark);
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: var(--card);
    border-radius: 16px;
    padding: 36px 32px;
    box-shadow: 0 1px 2px rgba(30,27,46,0.04), 0 20px 40px -14px rgba(79,70,229,0.18);
    border: 1px solid var(--border);
  }

  .icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, #6366F1, #4F46E5);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    box-shadow: 0 8px 16px -6px rgba(79,70,229,0.45);
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }

  .sub {
    font-size: 13.5px;
    color: var(--text-muted);
    margin: 0 0 24px;
  }

  label {
    display: block;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .field { margin-bottom: 16px; }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 9px;
    border: 1px solid var(--border);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    background: #FAFAFB;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  input:focus {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(79,70,229,0.14);
  }

  .row-between {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12.5px;
    margin: 2px 0 20px;
  }

  .row-between label { margin: 0; display: flex; align-items: center; gap: 6px; font-weight: 400; color: var(--text-muted); }
  .row-between a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .row-between a:hover { text-decoration: underline; }

  button.submit {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 9px;
    background: var(--accent);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease;
  }

  button.submit:hover { background: var(--accent-dark); }
  button.submit:active { transform: translateY(1px); }

  .footnote {
    margin-top: 20px;
    font-size: 11.5px;
    color: var(--text-muted);
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <rect x="5" y="10" width="14" height="10" rx="2" stroke="#fff" stroke-width="1.8"/>
      <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </div>

  <h1>Sign in</h1>
  <p class="sub">Enter your credentials to continue.</p>

  <form method="POST" action="/login" autocomplete="off">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter username" required />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required />
    </div>

    <div class="row-between">
      <label><input type="checkbox" style="width:auto;margin:0;" /> Remember me</label>
      <a href="#">Forgot password?</a>
    </div>

    <button type="submit" class="submit">Sign in</button>
  </form>

  <p class="footnote">Secure login · Access is logged and monitored.</p>
</div>
</body>
</html>
